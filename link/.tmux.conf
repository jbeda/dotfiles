# ~/.tmux.conf
#
# Goal: a comfortable long-running session on this machine that survives
# detach/reattach over SSH from Ghostty. Prefix is Ctrl-Space (see below);
# mentally swap it in when reading online cheat sheets written for Ctrl-b.

# --- Prefix ---------------------------------------------------------------
# Ctrl-Space instead of the default Ctrl-b. Ctrl-Space Ctrl-Space sends a
# literal Ctrl-Space through to the program in the pane.
unbind C-b
set  -g  prefix C-Space
bind C-Space send-prefix

# --- Terminal & color ----------------------------------------------------
# tmux-256color is the correct terminfo for tmux itself (replaces the old
# screen-256color). The terminal-features line tells tmux that the OUTER
# terminal (Ghostty) can do 24-bit truecolor, so colors pass through.
set  -g  default-terminal "tmux-256color"
set  -ga terminal-features ",xterm-ghostty:RGB"
set  -ga terminal-overrides ",*256col*:Tc"

# Let programs inside tmux write to the system clipboard via OSC 52. Ghostty
# forwards this to your Mac clipboard even over SSH, so copy-mode yanks land
# on your local clipboard. (Ghostty may prompt/limit large writes.)
set  -g  set-clipboard on

# Forward extended-key sequences (kitty keyboard protocol / CSI-u) from the
# outer terminal to programs in the pane. Without this, tmux collapses keys
# like Shift-Enter back to plain Enter, so Claude Code can't tell them apart
# (Shift-Enter = newline instead of submit). `on` = advertise + forward to
# apps that ask; extkeys tells tmux Ghostty can carry them.
set  -s  extended-keys on
set  -ga terminal-features ",xterm-ghostty:extkeys"

# --- General behavior ----------------------------------------------------
set  -g  mouse on               # scroll, click panes/windows, drag borders

# Click-to-focus on the FIRST click. tmux's default MouseDown1Pane both selects
# the pane AND forwards the click (`send -M`) to the app; when the target app
# grabs the mouse (Claude Code, vim, less -> mouse_any_flag=1) the forwarded
# click makes focus take two clicks to land. Drop the forward entirely: a click
# only ever selects the pane. Tradeoff: clicks no longer reach the app (you can't
# click inside Claude Code to position the cursor), but the scroll wheel still
# works (WheelUpPane forwards on its own), and keyboard is how you drive the app
# anyway. To restore in-app clicking, append `\; send -M` back.
bind -n MouseDown1Pane select-pane -t=
set  -g  history-limit 50000    # deep scrollback for long agent output
set  -s  escape-time 10         # don't treat ESC as the start of a sequence
set  -g  focus-events on        # apps (vim/emacs) learn when a pane is focused
set  -g  display-time 2000      # status messages linger ~2s

# Windows/panes number from 1 (0 is a stretch from 1 on the keyboard).
# `prefix <n>` still selects window n -- only the labels shift.
set  -g  base-index 1
setw -g  pane-base-index 1
set  -g  renumber-windows on    # close a window, no numbering gaps

# Keep the terminal/Ghostty tab title in sync with the tmux session/window.
set  -g  set-titles on
set  -g  set-titles-string "#S  #I:#W"

# Copy-mode uses emacs keys, matching your shell line-editing habits.
setw -g  mode-keys emacs

# The default emacs begin-selection key is C-Space, which the prefix now
# swallows (the prefix wins over copy-mode bindings). Use Space instead
# (vi-style); paging down is still PgDn / the mouse wheel.
bind -T copy-mode Space send -X begin-selection

# --- Convenience bindings (additive; defaults still work) -----------------
# prefix r  -> reload this file without restarting tmux
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Splits keep the current pane's working directory. The default keys (% and ")
# are rebound to add that behavior; | and - are friendly mnemonic aliases.
bind %   split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind |   split-window -h -c "#{pane_current_path}"
bind -   split-window -v -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"

# prefix i -> pull the Mac's clipboard image onto this box and type its path
# into the current pane (e.g. straight into a Claude Code prompt, which loads
# an image from a plain path). Runs `paste-image` over the reverse mac-bridge;
# the round-trip blocks briefly. On no-image / bridge-down, shows a message and
# types nothing. See linux/bin/paste-image and darwin/mac-bridge/.
bind i run-shell "p=\"\$(~/.local/bin/paste-image --quiet)\" && tmux send-keys -t '#{pane_id}' -l -- \"\$p \" || tmux display-message 'paste-image: no clipboard image, or mac-bridge down'"

# --- Prefixless pane/window movement (root table, no prefix) --------------
# Left Option is Meta in Ghostty, so Option+Shift+<key> arrives as M-S-<key>;
# `extended-keys on` (above) makes these modified combos reliable. `-n` binds
# them in the root table so they work WITHOUT the prefix -- the tradeoff is the
# focused app never sees these combos, which is fine as shells/Claude Code don't
# use them.
#
# Panes: Option+Shift+Arrow. (Plain Option+Arrow is left alone -- zsh/readline
# use it for word movement.)
bind -n M-S-Left  select-pane -L
bind -n M-S-Right select-pane -R
bind -n M-S-Up    select-pane -U
bind -n M-S-Down  select-pane -D

# Windows, tab-style cycling: Option+Tab -> next, Option+Shift+Tab -> previous
# (both wrap around). Meta+Tab is reliably distinct in every terminal encoding
# and Ghostty's own shortcuts are Cmd-based, so it won't intercept these -- which
# is why this works where Option+Shift+[ / ] didn't (shifted-bracket encoding is
# terminal-specific and Ghostty wasn't sending what tmux expected). Shift+Tab can
# arrive as M-S-Tab or M-BTab (back-tab), so bind both for the previous direction.
bind -n M-Tab   next-window
bind -n M-S-Tab previous-window
bind -n M-BTab  previous-window

# Fallback / bonus: Option+<n> jumps straight to window n. Uncomment if you want
# direct jumps as well.
# bind -n M-1 select-window -t 1
# bind -n M-2 select-window -t 2
# bind -n M-3 select-window -t 3
# bind -n M-4 select-window -t 4
# bind -n M-5 select-window -t 5
# bind -n M-6 select-window -t 6
# bind -n M-7 select-window -t 7
# bind -n M-8 select-window -t 8
# bind -n M-9 select-window -t 9

# --- Status bar (top, solarized) -----------------------------------------
# On top so it's clearly tmux's chrome, distinct from Claude Code's own status
# lines at the bottom of a pane. Solid solarized bar (not the default bg) so it
# reads as a bar; active window highlighted green, active pane border bright cyan
# (which is also how you SEE mouse/keyboard focus move between panes).
set  -g  status-position top
set  -g  status-interval 5
set  -g  status-style        "bg=#073642,fg=#839496"
set  -g  status-left         "#[fg=#002b36,bg=#268bd2,bold] #S #[fg=#268bd2,bg=#073642] "
set  -g  status-left-length  30
set  -g  status-right        "#[fg=#586e75] #H #[fg=#839496] %Y-%m-%d %H:%M "
set  -g  window-status-current-format "#[fg=#002b36,bg=#859900,bold] #I:#W#F "
set  -g  window-status-format         "#[fg=#839496] #I:#W#F "
set  -g  window-status-separator      ""

# Pane borders: dim inactive, bright cyan active -- the focus indicator.
set  -g  pane-border-style        "fg=#586e75"
set  -g  pane-active-border-style "fg=#2aa198"

# --- Persistence across reboots (resurrect + continuum) ------------------
# Vendored as git submodules under this repo (no plugin manager needed).
# resurrect: save/restore window & pane layout, cwd, and shell history.
#   prefix C-s  save     prefix C-r  restore
# continuum: automates it -- saves every 15 min and restores on server start.
#
# Note: a reboot kills any running process (agents included). These restore
# the *layout and shells* so you can relaunch quickly; they don't preserve a
# live process's in-memory state. Plain detach/reattach (no reboot) keeps
# processes running natively -- that's tmux itself, no plugin required.
set  -g  @resurrect-capture-pane-contents 'on'   # restore visible scrollback
set  -g  @continuum-restore 'on'                  # auto-restore on tmux start
set  -g  @continuum-save-interval '15'            # minutes between autosaves

run-shell ~/src/dotfiles/third_party/tmux-resurrect/resurrect.tmux
run-shell ~/src/dotfiles/third_party/tmux-continuum/continuum.tmux
