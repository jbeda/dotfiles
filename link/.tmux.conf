# ~/.tmux.conf
#
# Goal: a comfortable long-running session on this machine that survives
# detach/reattach over SSH from Ghostty. Prefix is Ctrl-Space (see below);
# mentally swap it in when reading online cheat sheets written for Ctrl-b.

# --- Prefix ---------------------------------------------------------------
# Ctrl-Space instead of the default Ctrl-b. Ctrl-Space Ctrl-Space sends a
# literal Ctrl-Space through to the program in the pane.
unbind C-b
set  -g  prefix C-Space
bind C-Space send-prefix

# --- Terminal & color ----------------------------------------------------
# tmux-256color is the correct terminfo for tmux itself (replaces the old
# screen-256color). The terminal-features line tells tmux that the OUTER
# terminal (Ghostty) can do 24-bit truecolor, so colors pass through.
set  -g  default-terminal "tmux-256color"
set  -ga terminal-features ",xterm-ghostty:RGB"
set  -ga terminal-overrides ",*256col*:Tc"

# Let programs inside tmux write to the system clipboard via OSC 52. Ghostty
# forwards this to your Mac clipboard even over SSH, so copy-mode yanks land
# on your local clipboard. (Ghostty may prompt/limit large writes.)
set  -g  set-clipboard on

# Forward extended-key sequences (kitty keyboard protocol / CSI-u) from the
# outer terminal to programs in the pane. Without this, tmux collapses keys
# like Shift-Enter back to plain Enter, so Claude Code can't tell them apart
# (Shift-Enter = newline instead of submit). `on` = advertise + forward to
# apps that ask; extkeys tells tmux Ghostty can carry them.
set  -s  extended-keys on
set  -ga terminal-features ",xterm-ghostty:extkeys"

# --- General behavior ----------------------------------------------------
set  -g  mouse on               # scroll, click panes/windows, drag borders
set  -g  history-limit 50000    # deep scrollback for long agent output
set  -s  escape-time 10         # don't treat ESC as the start of a sequence
set  -g  focus-events on        # apps (vim/emacs) learn when a pane is focused
set  -g  display-time 2000      # status messages linger ~2s

# Windows/panes number from 1 (0 is a stretch from 1 on the keyboard).
# `prefix <n>` still selects window n -- only the labels shift.
set  -g  base-index 1
setw -g  pane-base-index 1
set  -g  renumber-windows on    # close a window, no numbering gaps

# Keep the terminal/Ghostty tab title in sync with the tmux session/window.
set  -g  set-titles on
set  -g  set-titles-string "#S  #I:#W"

# Copy-mode uses emacs keys, matching your shell line-editing habits.
setw -g  mode-keys emacs

# The default emacs begin-selection key is C-Space, which the prefix now
# swallows (the prefix wins over copy-mode bindings). Use Space instead
# (vi-style); paging down is still PgDn / the mouse wheel.
bind -T copy-mode Space send -X begin-selection

# --- Convenience bindings (additive; defaults still work) -----------------
# prefix r  -> reload this file without restarting tmux
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Splits keep the current pane's working directory. The default keys (% and ")
# are rebound to add that behavior; | and - are friendly mnemonic aliases.
bind %   split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind |   split-window -h -c "#{pane_current_path}"
bind -   split-window -v -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"

# --- Status bar (minimal) ------------------------------------------------
set  -g  status-interval 5
set  -g  status-style        "bg=default"
set  -g  status-left         "[#S] "
set  -g  status-left-length  30
set  -g  status-right        " %Y-%m-%d %H:%M "

# --- Persistence across reboots (resurrect + continuum) ------------------
# Vendored as git submodules under this repo (no plugin manager needed).
# resurrect: save/restore window & pane layout, cwd, and shell history.
#   prefix C-s  save     prefix C-r  restore
# continuum: automates it -- saves every 15 min and restores on server start.
#
# Note: a reboot kills any running process (agents included). These restore
# the *layout and shells* so you can relaunch quickly; they don't preserve a
# live process's in-memory state. Plain detach/reattach (no reboot) keeps
# processes running natively -- that's tmux itself, no plugin required.
set  -g  @resurrect-capture-pane-contents 'on'   # restore visible scrollback
set  -g  @continuum-restore 'on'                  # auto-restore on tmux start
set  -g  @continuum-save-interval '15'            # minutes between autosaves

run-shell ~/src/dotfiles/third_party/tmux-resurrect/resurrect.tmux
run-shell ~/src/dotfiles/third_party/tmux-continuum/continuum.tmux
