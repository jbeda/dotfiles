# Default kind cluster config, applied by the `kind` wrapper in
# source/50_kind.sh when `kind create cluster` is run without --config.
#
# etcd runs with fsync disabled: a dev cluster's data is disposable, and
# skipping the fsync-per-write keeps etcd from hammering the disk (matters
# on budget NVMe like claudes-plan's DRAM-less drive). Worst case on power
# loss is a corrupt cluster -- delete and recreate.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
kubeadmConfigPatches:
  - |
    apiVersion: kubeadm.k8s.io/v1beta4
    kind: ClusterConfiguration
    etcd:
      local:
        extraArgs:
          - name: unsafe-no-fsync
            value: "true"
